name: CD - Budowanie i Publikacja Obrazów

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Retrieving the code from the repository
      uses: actions/checkout@v4

    - name: Set up QEMU (ARM Emulation for Raspberry Pi)
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx (Advanced Building)
      uses: docker/setup-buildx-action@v3

    - name: Logowanie do GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Preparing username in lowercase
      run: |
        echo "OWNER_LOWER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

    - name: Building and serving the BACKEND image
      uses: docker/build-push-action@v6
      with:
        context: ./backend
        file: ./backend/Dockerfile
        platforms: linux/arm64
        push: true
        tags: ghcr.io/${{ env.OWNER_LOWER }}/mood-backend:latest

    - name: Building and serving the FRONTEND image
      uses: docker/build-push-action@v6
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        platforms: linux/arm64
        push: true
        tags: ghcr.io/${{ env.OWNER_LOWER }}/mood-frontend:latest
